# yolo-frontend configuration
# Override any of these by exporting the variable before running a script,
# or edit this file directly for your environment.

TRMM_API_DIR="${TRMM_API_DIR:-/rmm/api/tacticalrmm}"
VERSIONS_DIR="${VERSIONS_DIR:-/var/www/rmm/versions}"
DIST_DIR="${DIST_DIR:-/var/www/rmm/dist}"
DIST_SYMLINK="$DIST_DIR"
ENV_CONFIG_SRC="${ENV_CONFIG_SRC:-/var/www/rmm-bak/dist/env-config.js}"
DEPLOY_USER="${DEPLOY_USER:-${SUDO_USER:-$(logname 2>/dev/null || whoami)}}"
WEB_GROUP="${WEB_GROUP:-www-data}"

# Multi-repo settings
YOLO_DIR="${YOLO_DIR:-$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)}"
REPOS_DIR="${REPOS_DIR:-$YOLO_DIR/repos}"
DEFAULT_REPO_URL="${DEFAULT_REPO_URL:-https://github.com/amidaware/tacticalrmm-web.git}"
DEFAULT_REPO_NAME="${DEFAULT_REPO_NAME:-amidaware}"

# Extra repos to clone and build during install (space-separated GitHub URLs)
EXTRA_REPOS="${EXTRA_REPOS:-https://github.com/silversword411/tacticalrmm-web.git@1.4.0-fe-main-custom-fields}"

# Derive repo name from a git URL (GitHub owner, or basename for non-GitHub)
repo_name_from_url() {
    local url="$1"
    local owner
    owner=$(echo "$url" | sed -n 's|.*github\.com[:/]\([^/]*\)/.*|\1|p')
    if [ -n "$owner" ]; then
        echo "$owner"
    else
        basename "$url" .git
    fi
}
